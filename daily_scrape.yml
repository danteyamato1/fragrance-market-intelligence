name: Daily Fragrantica Scrape

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Create folders
        run: mkdir -p raw_data

      - name: Run scraper
        run: python scrape_fragrantica.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raw_data/*.csv
          if git diff --staged --quiet; then
            echo "No new data"
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "scrape: ${DATE}"
            git push
          fi
