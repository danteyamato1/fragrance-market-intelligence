name: Daily Fragrance Scrape

on:
  schedule:
    - cron: "0 6 * * *"    # 06:00 UTC every day
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: true
        default: "fragrantica-only"
        type: choice
        options:
          - fragrantica-only
          - full
          - amazon-only
          - test

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Prepare data dirs
        run: mkdir -p raw_data cleaned_data

      - name: Run pipeline (scrape → clean → features → DB → analysis)
        run: |
          MODE="${{ github.event.inputs.mode || 'fragrantica-only' }}"
          case "$MODE" in
            test)             make scrape-test ;;
            fragrantica-only) make scrape-frag ;;
            amazon-only)      make scrape-amz ;;
            full|*)           make scrape ;;
          esac

      - name: Commit updated data + database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raw_data/*.csv cleaned_data/*.csv *.db fx_cache.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "daily scrape: $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload artefacts (for inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-${{ github.run_id }}
          path: |
            cleaned_data/
            fragrance_market.db
          retention-days: 14
