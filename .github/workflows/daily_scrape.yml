name: Daily Fragrance Scrape

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: true
        default: "full"
        type: choice
        options:
          - fragrantica-only
          - full
          - amazon-only
          - test

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Prepare data dirs
        run: mkdir -p raw_data cleaned_data docs

      - name: Run pipeline (scrape → clean → features → DB → analysis)
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          case "$MODE" in
            test)             make scrape-test ;;
            fragrantica-only) make scrape-fragrantica ;;
            amazon-only)      make scrape-amazon ;;
            full)             make scrape ;;
            *)
              echo "ERROR: Unknown mode '$MODE'"
              echo "Valid modes: test, fragrantica-only, amazon-only, full"
              exit 1
              ;;
          esac

      - name: Publish report to GitHub Pages
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          REPORT="cleaned_data/report_${TODAY}.html"

          if [ -f "$REPORT" ]; then
            mkdir -p docs
            cp "$REPORT" docs/index.html
            cp "$REPORT" "docs/report_${TODAY}.html"
            echo "Published $REPORT to docs/"
          else
            echo "No report for ${TODAY} at ${REPORT} — skipping publish"
          fi

      - name: Commit updated data + database + report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add raw_data/*.csv cleaned_data/*.csv *.db fragrance_market.db fx_cache.json docs/ 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No new data to commit"
            exit 0
          fi

          git commit -m "daily scrape: $(date -u +%Y-%m-%d)"

          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed on attempt $i — rebasing and retrying"
            git stash --include-untracked || true
            git pull --rebase origin main || true
            git stash pop || true
          done

          echo "Push failed after 3 attempts"
          exit 1

      - name: Upload artefacts (for inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-${{ github.run_id }}
          path: |
            cleaned_data/
            fragrance_market.db
          retention-days: 14