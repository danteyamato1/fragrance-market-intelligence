
name: Daily Fragrance Scrape

on:

  schedule:
    - cron: "0 6 * * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "Choose scraping mode"
        required: true
        default: "fragrantica-only"
        type: choice
        options:
          - fragrantica-only 
          - full            
          - demo         


concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90


    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

   
      - name: Install dependencies
        run: pip install -r requirements.txt


      - name: Install Playwright (if needed)
        if: ${{ github.event.inputs.mode == 'full' }}
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium


      - name: Create data directories
        run: mkdir -p raw_data cleaned_data


      - name: Run daily scraper
        run: |
          MODE="${{ github.event.inputs.mode || 'fragrantica-only' }}"

          if [ "$MODE" = "fragrantica-only" ]; then
            python daily_scraper.py --fragrantica-only
          elif [ "$MODE" = "full" ]; then
            python daily_scraper.py
          elif [ "$MODE" = "demo" ]; then
            python daily_scraper.py --demo
          fi

      - name: Commit and push new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add raw_data/*.csv
          git add cleaned_data/*.csv

          # Only commit if there's something new
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "daily scrape: ${DATE}"
            git push
          fi
